<!doctype html>
<html>
  <body>
    <script type="module">
      //overwrite console.log
      const originalLog = console.log.bind(console);
      const originalWarn = console.warn.bind(console);
      const originalError = console.error.bind(console);
      const originalInfo = console.info.bind(console);

      const overwriteFunction = (originalFunction) => {
        return (...args) => {
          window.parent.postMessage({ 
            source: 'runjs-preview',
            payload: args,
          }, '*');

          originalFunction(...args);
        }
      }

      console.log = overwriteFunction(originalLog);
      console.warn = overwriteFunction(originalWarn);
      console.error = overwriteFunction(originalError);
      console.info = overwriteFunction(originalInfo);

      window.log = overwriteFunction(originalLog);
      window.warn = overwriteFunction(originalWarn);
      window.error = overwriteFunction(originalError);
      window.info = overwriteFunction(originalInfo);

      // your code here
    </script>
  </body>
</html>
