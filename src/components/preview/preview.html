<!doctype html>
<html>
  <body>
    <script type="module">
      //overwrite console.log
      const originalLog = console.log.bind(console);
      const originalWarn = console.warn.bind(console);
      const originalError = console.error.bind(console);
      const originalInfo = console.info.bind(console);

      const overwriteFunction = (originalFunction, type) => {
        return (...args) => {
          window.parent.postMessage({ 
            source: 'runjs-preview',
            payload: args,
            type
          }, '*');

          originalFunction(...args);
        }
      }

      console.log = overwriteFunction(originalLog, 'log');
      console.warn = overwriteFunction(originalWarn, 'warn');
      console.error = overwriteFunction(originalError, 'error');
      console.info = overwriteFunction(originalInfo, 'info');

      window.log = overwriteFunction(originalLog, 'log');
      window.warn = overwriteFunction(originalWarn, 'warn');
      window.error = overwriteFunction(originalError, 'error');
      window.info = overwriteFunction(originalInfo, 'info');

      const getNow = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());

      const isPromiseLike = value => (
        typeof value === 'object'
        && value !== null
        && typeof value.then === 'function'
      );

      window.perf = (fn, options = {}, ...args) => {
        const { label = fn?.name || 'anonymous', log = true, onMeasure } = options;

        const reportDuration = startTime => {
          const durationMs = getNow() - startTime;
          if (typeof onMeasure === 'function') {
            onMeasure(durationMs);
          }
          if (log) {
            console.log(`[perf] ${label}: ${durationMs.toFixed(2)}ms`);
          }
        };

        const startTime = getNow();
        const result = fn(...args);

        if (isPromiseLike(result)) {
          return result.finally(() => reportDuration(startTime));
        }

        reportDuration(startTime);
        return result;
      };
      try {
       // your code here
      } catch (error) {
        console.error(error);
      }
    </script>
  </body>
</html>
